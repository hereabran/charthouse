<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Charthouse — Helm chart playground</title>
    <meta name="description" content="Charthouse — a realtime Helm chart playground: render templates live, explore resource topology, and share charts. Self-hostable and vendor-neutral." />
    <script>
      // Apply persisted theme + toggles before paint to avoid a flash.
      try {
        const root = document.documentElement;
        const t = localStorage.getItem('hp:theme');
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const dark = t ? t === 'dark' : sysDark;
        root.classList.toggle('dark', dark);
        root.classList.toggle('sharp', localStorage.getItem('hp:border') === 'sharp');
        root.classList.toggle('crt', localStorage.getItem('hp:crt') === 'crt');
      } catch {}
    </script>
  </head>
  <body class="bg-gv-bg text-gv-fg font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
